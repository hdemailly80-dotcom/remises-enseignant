// Badge color per via
const viaColor = {"Préau":"#f0b429","Billetterie Préau":"#e07b39","Ekoya":"#5b8dee"};

const nomSel = document.getElementById('sel-nom');
const typeSel = document.getElementById('sel-type');

// Noms uniques triés (pour le menu) — mais on affiche TOUTES les occurrences à la recherche
[...new Set(data.map(d=>d.nom))].sort((a,b)=>a.localeCompare(b,'fr')).forEach(n=>{
  const o=document.createElement('option');o.value=n;o.textContent=n;nomSel.appendChild(o);
});
[...new Set(data.map(d=>d.type))].sort((a,b)=>a.localeCompare(b,'fr')).forEach(t=>{
  const o=document.createElement('option');o.value=t;o.textContent=t;typeSel.appendChild(o);
});

const txtSearch = document.getElementById('txt-search');
txtSearch.addEventListener('input',()=>{
  const q=txtSearch.value.trim().toLowerCase();
  if(!q){document.getElementById('results').innerHTML='';return;}
  nomSel.value='';typeSel.value='';
  const found=data.filter(d=>d.nom.toLowerCase().includes(q));
  show(found, q);
});
nomSel.addEventListener('change',()=>{if(nomSel.value){txtSearch.value='';typeSel.value='';show(data.filter(d=>d.nom===nomSel.value));}});
typeSel.addEventListener('change',()=>{if(typeSel.value){txtSearch.value='';nomSel.value='';show(data.filter(d=>d.type===typeSel.value));}});

function show(items, q=''){
  const div=document.getElementById('results');
  if(!items.length){
    div.innerHTML=`<p class="no-result">Aucun résultat${q?' pour "'+q+'"':''}.</p>`;return;
  }
  div.innerHTML=`<p class="count-label">${items.length} résultat${items.length>1?'s':''}</p>`;
  items.forEach(it=>{
    const c=viaColor[it.via]||'#f0b429';
    div.innerHTML+=`
      <div class="result-item" style="border-left-color:${c}">
        <div class="result-name">${it.nom}</div>
        <div class="result-type">${it.type}</div>
        <div class="result-remise" style="color:#4dd98a">${it.remise}</div>
        <div class="result-via">↗ ${it.via}</div>
      </div>`;
  });
}

function reset(){
  txtSearch.value='';nomSel.value='';typeSel.value='';
  document.getElementById('results').innerHTML='';
}
